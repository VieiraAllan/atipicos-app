<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atípicos — Protótipo (Auth & Cadastro)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Inter:wght@400;500;700&family=Happy+Monkey&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Quicksand", sans-serif;
    background: #e7e1d8;
    background-image: radial-gradient(120% 80% at 50% 0%, #efe9e0 0%, #e3ddd3 70%);
    color: #151426;
    overflow: hidden;
  }
  #root { height: 100%; }

  .atp-stage {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 16px;
  }

  /* ── Telefone ── */
  .atp-phone-wrap { transform-origin: center center; }
  .atp-phone {
    width: 456px; height: 958px;
    background: #16161b;
    border-radius: 58px;
    padding: 13px;
    box-shadow: 0 30px 70px -24px rgba(20,16,30,0.55), 0 2px 0 1px #2c2c33 inset, 0 0 0 2px #000;
  }
  .atp-screen {
    position: relative;
    width: 430px; height: 932px;
    background: #fdfbf7;
    border-radius: 46px;
    overflow: hidden;
  }
  .atp-notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 26px; background: #16161b; border-radius: 16px; z-index: 40;
  }

  /* ── Páginas ── */
  .atp-page { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .atp-anim { position: absolute; inset: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .atp-anim { animation: atp-in .34s cubic-bezier(.2,.7,.2,1); }
  }
  @keyframes atp-in { from { transform: translateY(12px); } to { transform: none; } }

  .atp-center { align-items: center; justify-content: center; padding: 58px 36px 44px; }
  .atp-scroll {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
    padding: 60px 44px 44px;
  }
  .atp-scroll::-webkit-scrollbar { width: 0; }

  /* ── Voltar ── */
  .atp-back {
    position: absolute; left: 16px; top: 70px; z-index: 30;
    color: #151426; background: none; border: none; padding: 0; cursor: pointer;
    line-height: 0; transition: transform .12s ease, opacity .15s ease;
  }
  .atp-back:hover { opacity: .7; }
  .atp-back:active { transform: scale(.9); }

  /* ── Títulos ── */
  .atp-title {
    width: 100%; margin: 30px 0 24px;
    font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 25px; color: #151426;
  }

  /* ── Formulário ── */
  .atp-form { width: 100%; display: flex; flex-direction: column; gap: 15px; }
  .atp-field {
    display: flex; align-items: center; gap: 11px;
    width: 100%; height: 47px; padding: 0 14px;
    border-radius: 10px; background: rgba(109,29,0,0.05);
    box-shadow: inset 0 0 0 1.6px #1d1c1b;
    transition: box-shadow .15s ease, background .15s ease;
  }
  .atp-field:focus-within { box-shadow: inset 0 0 0 2.2px #6d1d00; background: rgba(109,29,0,0.08); }
  .atp-field-ic { color: #1d1c1b; display: flex; }
  .atp-field-in {
    flex: 1; min-width: 0; border: none; background: transparent; outline: none;
    font-family: "Quicksand", sans-serif; font-weight: 500; font-size: 15px; color: #1d1c1b;
  }
  .atp-field-in::placeholder { color: #8f8a83; }
  .atp-select { appearance: none; -webkit-appearance: none; cursor: pointer; }
  .atp-field-chev { color: #1d1c1b; display: flex; margin-left: auto; pointer-events: none; }

  .atp-link {
    align-self: flex-end; margin: 12px 2px 0; padding: 0;
    background: none; border: none; cursor: pointer;
    font-family: "Inter", sans-serif; font-size: 12px; color: #5a31ff;
  }
  .atp-link:hover { text-decoration: underline; }
  .atp-cta { width: 100%; display: flex; justify-content: center; margin-top: 30px; }

  /* ── Botões ── */
  .atp-btn {
    font-family: "Quicksand", sans-serif; font-weight: 700; color: #151426;
    background: rgba(109,29,0,0.05); border: 2px solid #151426; border-radius: 16px;
    cursor: pointer; transition: transform .12s ease, background .15s ease, box-shadow .15s ease;
    padding: 0 24px; height: 52px; font-size: 17px; white-space: nowrap;
  }
  .atp-btn:hover { background: rgba(109,29,0,0.11); }
  .atp-btn:active { transform: scale(.96); }
  .atp-btn-lg { min-width: 232px; height: 62px; font-size: 20px; border-radius: 20px; }
  .atp-btn-sm { height: 36px; padding: 0 22px; font-size: 14px; border-radius: 8px; }
  .atp-btn-success { background: rgba(152,255,152,0.42); border-color: rgba(21,20,38,0.6); }
  .atp-btn-success:hover { background: rgba(152,255,152,0.62); }

  .atp-stack { display: flex; flex-direction: column; gap: 24px; margin-top: 50px; align-items: center; }

  /* ── Sucesso ── */
  .atp-success-msg {
    font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 24px; text-align: center;
    color: #2e8a5b; max-width: 268px; line-height: 1.3; margin: 52px 0 42px;
  }

  /* ── Área interna (stub) ── */
  .atp-area-badge {
    width: 92px; height: 92px; border-radius: 50%; margin-top: 30px;
    display: flex; align-items: center; justify-content: center; font-size: 44px;
    background: rgba(109,29,0,0.06); box-shadow: inset 0 0 0 2px rgba(21,20,38,0.5);
  }
  .atp-area-title { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 26px; margin: 20px 0 8px; color: #151426; }
  .atp-area-note { font-family: "Quicksand", sans-serif; font-weight: 500; font-size: 15px; color: #6d6c6c; text-align: center; line-height: 1.5; max-width: 270px; margin: 0; }
  .atp-area-actions { display: flex; flex-direction: column; gap: 16px; margin-top: 34px; align-items: center; }

  /* ── Splash ── */
  .atp-splash { cursor: pointer; }
  .atp-splash-logo { animation: atp-splash 1.9s ease both; }
  @keyframes atp-splash {
    0% { opacity: 0; transform: scale(.86); }
    22% { opacity: 1; transform: scale(1); }
    82% { opacity: 1; transform: scale(1); }
    100% { opacity: .92; transform: scale(1.01); }
  }

  /* ── Legenda ── */
  .atp-caption {
    display: flex; align-items: center; gap: 16px;
    font-family: "Inter", sans-serif; font-size: 13px; color: #8b8478;
  }
  .atp-caption button {
    font-family: "Inter", sans-serif; font-size: 13px; color: #6d6c6c;
    background: rgba(255,255,255,0.6); border: 1px solid #cfc8bb; border-radius: 20px;
    padding: 5px 14px; cursor: pointer; transition: background .15s ease;
  }
  .atp-caption button:hover { background: #fff; }

  /* ══════════════ TELAS INTERNAS (Fase 4) ══════════════ */
  .itp-page { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .itp-body { flex: 1; overflow-y: auto; padding: 0 23px 92px; }
  .itp-body::-webkit-scrollbar { width: 0; }

  .itp-topbar { display: flex; align-items: center; gap: 14px; padding: 58px 18px 16px; }
  .itp-logout {
    width: 42px; height: 42px; border-radius: 10px; background: #2c2c33; color: #fdfbf7;
    display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex: 0 0 auto;
  }
  .itp-logout:active { transform: scale(.92); }
  .itp-pill {
    flex: 1; height: 54px; border-radius: 30px; background: #ffdd6e; border: 3px solid #151426;
    display: flex; align-items: center; padding: 0 22px;
    font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 18px; color: #151426;
  }
  .itp-bell { font-size: 30px; background: none; border: none; cursor: pointer; flex: 0 0 auto; }
  .itp-bell:active { transform: scale(.9); }

  .itp-bottomnav {
    position: absolute; left: 0; right: 0; bottom: 0; height: 74px; background: #ffe6b7;
    border-top: 2px solid #5a5a5a; display: flex; align-items: center; justify-content: space-around;
    padding: 0 24px; z-index: 20;
  }
  .itp-navbtn { font-size: 30px; background: none; border: none; cursor: pointer; padding: 4px 8px; }
  .itp-navbtn:active { transform: scale(.88); }
  .itp-navbtn[data-on="true"] { filter: drop-shadow(0 0 0 #151426); transform: scale(1.12); }
  .itp-sos {
    min-width: 78px; height: 50px; border-radius: 30px; background: #ff4d4d; border: 3px solid #151426;
    font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 24px; color: #151426; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 0 14px;
  }
  .itp-sos:active { transform: scale(.94); }

  .itp-h2 { font-family: "Happy Monkey", sans-serif; font-size: 18px; color: #151426; margin: 6px 2px 14px; }

  /* Home Kids — grade de atividades */
  .itp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .itp-kidcard {
    aspect-ratio: 1 / 0.92; border-radius: 15px; border: 3px solid #151426;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; transition: transform .12s ease; padding: 8px;
  }
  .itp-kidcard:active { transform: scale(.96); }
  .itp-kidcard .emoji { font-size: 54px; line-height: 1; }
  .itp-kidcard .lbl { font-family: "Happy Monkey", sans-serif; font-size: 18px; color: #151426; text-align: center; line-height: 1.1; }

  /* Cards / linhas (área pais) */
  .itp-card { background: #fff; border-radius: 15px; border: 3px solid #151426; overflow: hidden; margin-bottom: 18px; }
  .itp-card-title {
    font-family: "Happy Monkey", sans-serif; font-size: 15px; text-align: center; padding: 9px; color: #151426;
    border-bottom: 1px solid rgba(0,0,0,.15);
  }
  .itp-card-body { padding: 14px; }
  .itp-row {
    display: flex; align-items: center; gap: 14px; background: rgba(0,0,0,.06);
    border: 3px solid #151426; border-radius: 15px; padding: 14px 16px; margin-bottom: 18px; cursor: pointer;
    transition: background .15s ease;
  }
  .itp-row:active { transform: scale(.98); }
  .itp-row:hover { background: rgba(0,0,0,.1); }
  .itp-row .emoji { font-size: 40px; flex: 0 0 auto; }
  .itp-row .lbl { font-family: "Happy Monkey", sans-serif; font-size: 20px; color: #151426; }

  /* Mapa placeholder (OpenStreetMap — Fase 4) */
  .itp-map {
    height: 158px; position: relative; display: flex; align-items: center; justify-content: center;
    background-color: #e8e4dc;
    background-image:
      linear-gradient(#fff 2px, transparent 2px), linear-gradient(90deg, #fff 2px, transparent 2px),
      linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px, 80px 80px, 80px 80px;
    background-position: -20px 30px, 40px -10px, 0 0, 0 0;
  }
  .itp-map .pin { font-size: 34px; filter: drop-shadow(0 2px 2px rgba(0,0,0,.3)); }
  .itp-map .osm { position: absolute; bottom: 6px; right: 8px; font-family: "Inter", monospace; font-size: 9px; color: #8b8478; }

  /* Emoções */
  .itp-emotion {
    background: #96dffe; border: 3px solid #151426; border-radius: 15px; aspect-ratio: 1 / 0.88;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
    transition: transform .12s ease;
  }
  .itp-emotion:active { transform: scale(.95); }
  .itp-emotion.sel { box-shadow: inset 0 0 0 5px #2e8a5b; }
  .itp-emotion .emoji { font-size: 56px; }
  .itp-emotion .lbl { font-family: "Happy Monkey", sans-serif; font-size: 18px; color: #151426; }

  /* Tarefas / rotina */
  .itp-task {
    display: flex; align-items: center; gap: 12px; background: #fff; border: 3px solid #151426;
    border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; cursor: pointer; transition: background .15s ease;
  }
  .itp-task.done { background: rgba(152,255,152,.32); }
  .itp-task .chk {
    width: 28px; height: 28px; border-radius: 8px; border: 2.5px solid #151426; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 18px; background: #fff;
  }
  .itp-task.done .chk { background: #98ff98; }
  .itp-task .emoji { font-size: 30px; }
  .itp-task .t { font-family: "Quicksand", sans-serif; font-weight: 600; font-size: 16px; color: #151426; flex: 1; }
  .itp-task .time { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 14px; color: #6d6c6c; }

  /* Comunicação (AAC) */
  .itp-aac-bar {
    display: flex; align-items: center; gap: 10px; background: #fff; border: 3px solid #151426;
    border-radius: 14px; padding: 10px 12px; min-height: 66px; margin-bottom: 16px;
  }
  .itp-aac-sentence { flex: 1; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; min-height: 40px; }
  .itp-aac-empty { font-family: "Quicksand", sans-serif; font-size: 14px; color: #8f8a83; }
  .itp-aac-chip {
    font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 15px; background: #ffe6b7;
    border: 2px solid #151426; border-radius: 8px; padding: 4px 8px; display: flex; gap: 5px; align-items: center;
  }
  .itp-speak { width: 50px; height: 50px; border-radius: 50%; background: #aee3ff; border: 3px solid #151426; font-size: 24px; cursor: pointer; flex: 0 0 auto; }
  .itp-speak:active { transform: scale(.92); }
  .itp-aac-tools { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 14px; }
  .itp-aac-tool { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 13px; background: #fff; border: 2px solid #151426; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  .itp-aac-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .itp-aac-btn {
    aspect-ratio: 1 / 1; background: #fff; border: 3px solid #151426; border-radius: 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer;
    transition: transform .1s ease;
  }
  .itp-aac-btn:active { transform: scale(.93); }
  .itp-aac-btn .emoji { font-size: 38px; }
  .itp-aac-btn .lbl { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 13px; color: #151426; }

  /* Listas (fono / psico / escola / config) */
  .itp-listitem {
    display: flex; align-items: center; gap: 14px; background: #fff; border: 3px solid #151426;
    border-radius: 14px; padding: 14px 16px; margin-bottom: 13px; cursor: pointer; transition: background .15s ease;
  }
  .itp-listitem:hover { background: #fffdf8; }
  .itp-listitem:active { transform: scale(.99); }
  .itp-listitem .emoji { font-size: 32px; flex: 0 0 auto; }
  .itp-listitem .body { flex: 1; }
  .itp-listitem .ti { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 16px; color: #151426; }
  .itp-listitem .su { font-family: "Quicksand", sans-serif; font-weight: 500; font-size: 13px; color: #6d6c6c; }
  .itp-listitem .go { font-size: 20px; color: #8f8a83; }

  /* Pacientes (terapeuta) */
  .itp-patient { background: #99c8cc; border: 3px solid #151426; border-radius: 15px; padding: 16px; margin-bottom: 18px; cursor: pointer; }
  .itp-patient-head { display: flex; gap: 14px; }
  .itp-avatar { width: 78px; height: 78px; border-radius: 50%; background: #fdfbf7; border: 2px solid #151426; display: flex; align-items: center; justify-content: center; font-size: 46px; flex: 0 0 auto; }
  .itp-patient-info { flex: 1; font-family: "Quicksand", sans-serif; font-weight: 600; font-size: 15px; color: #151426; line-height: 1.5; }
  .itp-patient-info b { font-family: "Quicksand", sans-serif; font-weight: 700; }
  .itp-online { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 13px; color: #1f8a5b; margin-top: 4px; }
  .itp-charts { display: flex; gap: 16px; margin-top: 14px; }
  .itp-chartbox { flex: 1; }
  .itp-chartbox .cap { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 13px; color: #151426; margin-bottom: 6px; text-align: center; }
  .itp-bars { display: flex; align-items: flex-end; justify-content: center; gap: 7px; height: 56px; }
  .itp-bars span { width: 13px; border-radius: 3px 3px 0 0; border: 1px solid #151426; }

  /* News (NewsAPI) */
  .itp-news { background: #fff; border: 3px solid #151426; border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
  .itp-news-img { height: 96px; background: repeating-linear-gradient(45deg, #ece7df, #ece7df 10px, #e3ddd3 10px, #e3ddd3 20px); display: flex; align-items: center; justify-content: center; font-size: 34px; }
  .itp-news-body { padding: 12px 14px; }
  .itp-news-body .ti { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 15px; color: #151426; }
  .itp-news-body .de { font-family: "Quicksand", sans-serif; font-weight: 500; font-size: 13px; color: #6d6c6c; margin-top: 4px; line-height: 1.4; }
  .itp-news-body .src { font-family: "Inter", sans-serif; font-size: 10px; color: #8f8a83; margin-top: 6px; }

  /* SOS / telas simples */
  .itp-sos-screen { position: absolute; inset: 0; background: #ff4d4d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px; text-align: center; }
  .itp-sos-screen .big { font-size: 84px; }
  .itp-sos-screen .ttl { font-family: "Quicksand", sans-serif; font-weight: 700; font-size: 30px; color: #151426; }
  .itp-sos-screen .sub { font-family: "Quicksand", sans-serif; font-weight: 500; font-size: 17px; color: #151426; max-width: 280px; line-height: 1.4; }

  .itp-toggle { width: 52px; height: 30px; border-radius: 20px; border: 2.5px solid #151426; background: #ddd; position: relative; cursor: pointer; flex: 0 0 auto; }
  .itp-toggle.on { background: #98ff98; }
  .itp-toggle .knob { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 50%; background: #151426; transition: left .15s ease; }
  .itp-toggle.on .knob { left: 24px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="proto/components.jsx"></script>
  <script type="text/babel" src="proto/internas-ui.jsx"></script>
  <script type="text/babel" src="proto/internas-kids.jsx"></script>
  <script type="text/babel" src="proto/internas-adultos.jsx"></script>
  <script type="text/babel" src="proto/screens.jsx"></script>
</body>
</html>
